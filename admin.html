<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Central Cabinetry</title>
    <style>
        *{box-sizing:border-box;margin:0;padding:0}body{font-family:'Helvetica Neue',Arial,sans-serif;background:#f5f6fa;color:#333}
        #login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#1A1A2E}
        .login-box{background:#fff;border-radius:12px;padding:40px;width:100%;max-width:400px;box-shadow:0 4px 24px rgba(0,0,0,.2)}
        .login-box h1{font-size:22px;margin-bottom:6px}.login-box p{color:#888;font-size:13px;margin-bottom:24px}
        .login-box input{width:100%;border:1px solid #ddd;border-radius:8px;padding:12px;font-size:14px;margin-bottom:12px}
        .btn-login{width:100%;background:#2A6496;color:#fff;border:none;border-radius:8px;padding:13px;font-size:15px;font-weight:600;cursor:pointer}
        .login-error{color:#c0392b;font-size:13px;margin-bottom:12px}
        #admin-panel{display:none}.admin-header{background:#1A1A2E;color:#fff;padding:16px 24px;display:flex;align-items:center;justify-content:space-between}
        .admin-header h1{font-size:18px}.btn-logout{background:none;border:1px solid #555;color:#aaa;padding:6px 16px;border-radius:6px;font-size:13px;cursor:pointer}
        .admin-body{max-width:1200px;margin:0 auto;padding:32px 24px}
        .styles-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px}
        .style-card{background:#fff;border-radius:10px;border:1px solid #eee;overflow:hidden}
        .style-card-img{height:140px;background-size:cover;background-position:center;background-color:#f0f0f0;position:relative}
        .badge{position:absolute;top:8px;right:8px;font-size:11px;font-weight:600;padding:3px 8px;border-radius:20px}
        .badge-active{background:#d4edda;color:#155724}.badge-hidden{background:#f8d7da;color:#721c24}
        .style-card-body{padding:12px}.style-card-code{font-size:11px;color:#aaa;text-transform:uppercase;letter-spacing:1px}
        .style-card-name{font-size:14px;font-weight:600;margin:3px 0}.style-card-type{font-size:12px;color:#888;margin-bottom:10px}
        .btn-edit{width:100%;background:#2A6496;color:#fff;border:none;border-radius:6px;padding:8px;font-size:13px;font-weight:600;cursor:pointer}
        .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center;padding:16px}
        .modal-overlay.open{display:flex}.modal{background:#fff;border-radius:14px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto}
        .modal-header{padding:20px 24px 16px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;justify-content:space-between}
        .modal-header h3{font-size:16px;font-weight:700}.btn-close{background:none;border:none;font-size:20px;color:#888;cursor:pointer}
        .modal-body{padding:20px 24px;display:flex;flex-direction:column;gap:14px}
        .field label{display:block;font-size:13px;font-weight:600;margin-bottom:5px;color:#555}
        .field input,.field select,.field textarea{width:100%;border:1px solid #ddd;border-radius:8px;padding:10px 12px;font-size:14px;font-family:inherit}
        .field textarea{height:70px;resize:vertical}.img-preview{margin-top:8px;width:100%;height:120px;object-fit:cover;border-radius:6px;border:1px solid #eee;display:none}
        .checkbox-row{display:flex;align-items:center;gap:8px}.modal-footer{padding:16px 24px;border-top:1px solid #f0f0f0;display:flex;gap:10px}
        .btn-cancel{flex:1;border:1px solid #ddd;background:#fff;border-radius:8px;padding:11px;font-size:14px;font-weight:600;cursor:pointer;color:#555}
        .btn-save{flex:1;background:#2A6496;color:#fff;border:none;border-radius:8px;padding:11px;font-size:14px;font-weight:600;cursor:pointer}
        .save-msg{text-align:center;font-size:13px;margin-top:8px}.save-msg.success{color:#155724}.save-msg.error{color:#721c24}
    </style>
</head>
<body>
<div id="login-screen">
    <div class="login-box">
        <h1>Admin Login</h1>
        <p>Central Cabinetry — Content Management</p>
        <div id="login-error" class="login-error" style="display:none"></div>
        <input type="email" id="login-email" placeholder="Email address">
        <input type="password" id="login-password" placeholder="Password" onkeydown="if(event.key==='Enter')doLogin()">
        <button class="btn-login" onclick="doLogin()">Sign In</button>
    </div>
</div>
<div id="admin-panel">
    <div class="admin-header">
        <div><h1>Central Cabinetry — Admin</h1><p id="admin-email" style="font-size:12px;color:#aaa;margin-top:2px"></p></div>
        <button class="btn-logout" onclick="doLogout()">Sign Out</button>
    </div>
    <div class="admin-body">
        <h2 style="font-size:22px;font-weight:700;margin-bottom:6px">Door Styles</h2>
        <p style="color:#888;font-size:13px;margin-bottom:24px">Click Edit to update any door style. Changes appear on the website immediately.</p>
        <div id="loading-styles" style="text-align:center;padding:60px;color:#888">Loading...</div>
        <div id="styles-grid" class="styles-grid" style="display:none"></div>
    </div>
</div>
<div class="modal-overlay" id="modal">
    <div class="modal">
        <div class="modal-header">
            <h3 id="modal-title">Edit Door Style</h3>
            <button class="btn-close" onclick="closeModal()">&#10005;</button>
        </div>
        <div class="modal-body">
            <input type="hidden" id="edit-id">
            <div class="field"><label>Name</label><input type="text" id="edit-name"></div>
            <div class="field"><label>Style Type</label><select id="edit-type"><option>Shaker Style</option><option>Double Edge Shaker</option><option>Raised Panel</option></select></div>
            <div class="field"><label>Image URL</label><input type="text" id="edit-image" placeholder="https://..." oninput="previewImage()"><img id="img-preview" class="img-preview" alt="Preview"></div>
            <div class="field"><label>Description (optional)</label><textarea id="edit-description"></textarea></div>
            <div class="field"><div class="checkbox-row"><input type="checkbox" id="edit-active"><label for="edit-active">Active (visible on website)</label></div></div>
            <div id="save-msg" class="save-msg"></div>
        </div>
        <div class="modal-footer">
            <button class="btn-cancel" onclick="closeModal()">Cancel</button>
            <button class="btn-save" id="btn-save" onclick="saveStyle()">Save Changes</button>
        </div>
    </div>
</div>
<script>
const SB_URL='https://apxelbabvviuwqpfivtr.supabase.co';
const SB_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFweGVsYmFidnZpdXdxcGZpdnRyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2NjEyOTYsImV4cCI6MjA5OTIzNzI5Nn0.EWt2FRAkJH86Is9P_uDjKDXnJ0O1J2qdg_BuctQavvY';
let token=null;
function hdrs(auth){const h={'apikey':SB_ANON,'Content-Type':'application/json'};h['Authorization']='Bearer '+(auth&&token?token:SB_ANON);return h;}
async function doLogin(){
    const email=document.getElementById('login-email').value.trim();
    const pwd=document.getElementById('login-password').value;
    const err=document.getElementById('login-error');err.style.display='none';
    const r=await fetch(SB_URL+'/auth/v1/token?grant_type=password',{method:'POST',headers:{'apikey':SB_ANON,'Content-Type':'application/json'},body:JSON.stringify({email,password:pwd})});
    const d=await r.json();
    if(d.access_token){token=d.access_token;document.getElementById('admin-email').textContent=email;document.getElementById('login-screen').style.display='none';document.getElementById('admin-panel').style.display='block';loadStyles();}
    else{err.textContent='Invalid email or password.';err.style.display='block';}
}
async function doLogout(){token=null;document.getElementById('login-screen').style.display='flex';document.getElementById('admin-panel').style.display='none';}
async function loadStyles(){
    const r=await fetch(SB_URL+'/rest/v1/door_styles?order=sort_order',{headers:hdrs(true)});
    const styles=await r.json();
    const grid=document.getElementById('styles-grid');
    grid.innerHTML=styles.map(s=>'<div class="style-card"><div class="style-card-img" style="'+(s.image_url?'background-image:url('+s.image_url+')':'')+'"><span class="badge '+(s.active?'badge-active':'badge-hidden')+'">'+(s.active?'Active':'Hidden')+'</span></div><div class="style-card-body"><div class="style-card-code">('+s.code+')</div><div class="style-card-name">'+s.name+'</div><div class="style-card-type">'+s.style_type+'</div><button class="btn-edit" onclick='openModal('+JSON.stringify(s)+')'>Edit</button></div></div>').join('');
    document.getElementById('loading-styles').style.display='none';grid.style.display='grid';
}
function openModal(s){
    document.getElementById('edit-id').value=s.id;
    document.getElementById('modal-title').textContent='Edit — ('+s.code+') '+s.name;
    document.getElementById('edit-name').value=s.name;
    document.getElementById('edit-type').value=s.style_type;
    document.getElementById('edit-image').value=s.image_url||'';
    document.getElementById('edit-description').value=s.description||'';
    document.getElementById('edit-active').checked=s.active;
    document.getElementById('save-msg').textContent='';
    previewImage();document.getElementById('modal').classList.add('open');
}
function closeModal(){document.getElementById('modal').classList.remove('open');}
function previewImage(){const u=document.getElementById('edit-image').value;const i=document.getElementById('img-preview');if(u){i.src=u;i.style.display='block';}else{i.style.display='none';}}
async function saveStyle(){
    const id=document.getElementById('edit-id').value;
    const btn=document.getElementById('btn-save');const msg=document.getElementById('save-msg');
    btn.disabled=true;btn.textContent='Saving...';msg.textContent='';
    const payload={name:document.getElementById('edit-name').value,style_type:document.getElementById('edit-type').value,image_url:document.getElementById('edit-image').value||null,description:document.getElementById('edit-description').value||null,active:document.getElementById('edit-active').checked};
    const r=await fetch(SB_URL+'/rest/v1/door_styles?id=eq.'+id,{method:'PATCH',headers:{...hdrs(true),'Prefer':'return=minimal'},body:JSON.stringify(payload)});
    btn.disabled=false;btn.textContent='Save Changes';
    if(r.ok){msg.textContent='Saved successfully!';msg.className='save-msg success';await loadStyles();setTimeout(closeModal,1200);}
    else{msg.textContent='Error saving. Please try again.';msg.className='save-msg error';}
}
document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal();});
</script>
</body>
</html>
